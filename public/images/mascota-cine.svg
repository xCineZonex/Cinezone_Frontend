import React from 'react';
import { Link } from 'react-router-dom';
import { useCartStore } from '../store/useCartStore';

const Navbar = () => {
  // Leemos cuántas entradas y snacks hay en el carrito global
  const { asientos, snacks } = useCartStore();
  
  // Calculamos el total de ítems en el carrito
  const totalItems = asientos.length + snacks.reduce((acc, snack) => acc + snack.cantidad, 0);

  return (
    <nav className="bg-blue-900 text-white shadow-lg sticky top-0 z-50">
      <div className="container mx-auto px-6 py-4 flex justify-between items-center">
        
        {/* Logo */}
        <Link to="/" className="text-2xl font-black flex items-center gap-2">
          <span className="text-pink-500">CINE</span>ZONE
        </Link>

        {/* Menú Principal */}
        <div className="hidden md:flex space-x-8 font-semibold">
          <Link to="/sedes" className="hover:text-pink-400 transition-colors">Cartelera</Link>
          <Link to="/dulceria" className="hover:text-pink-400 transition-colors">Dulcería</Link>
          <Link to="/promociones" className="hover:text-pink-400 transition-colors">Promociones</Link>
        </div>

        {/* Zona de Usuario y Carrito */}
        <div className="flex items-center gap-6">
          {/* Icono del Carrito de Compras */}
          <Link to="/checkout" className="relative group cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 group-hover:text-pink-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
            {/* Burbuja contadora del carrito */}
            {totalItems > 0 && (
              <span className="absolute -top-2 -right-2 bg-pink-600 text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full animate-bounce">
                {totalItems}
              </span>
            )}
          </Link>

          {/* Botón de Mi Cuenta / Login */}
          <Link to="/login" className="flex items-center gap-2 border border-blue-400 px-4 py-2 rounded-full hover:bg-blue-800 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
              <path fillRule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clipRule="evenodd" />
            </svg>
            <span className="font-bold text-sm">Mi Cuenta</span>
          </Link>
        </div>
      </div>
    </nav>
  );
};

export default Navbar;